akka {
  actor {
    provider = "cluster"

    serialization-bindings {
      "com.safety.protocol.CborSerializable" = jackson-cbor
    }
  }

  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      hostname = ${?AKKA_HOST}
      port = 2551
      port = ${?AKKA_PORT}
    }
  }

  cluster {
    seed-nodes = [
      "akka://industrial-safety@127.0.0.1:2551"
    ]

    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
  }
}

safety {
  http {
    host = "0.0.0.0"
    port = 8080
  }

  mongodb {
    uri = "mongodb+srv://admin:Roashu113@cluster0.u8hiw7n.mongodb.net/?appName=Cluster0"
    uri = ${?MONGODB_URI}
    database = "safety"
  }

  qdrant {
    url = "https://4e1ef77b-fa68-4c7f-8e43-3862bd93386e.us-west-2-0.aws.cloud.qdrant.io"
    url = ${?QDRANT_URL}
    api-key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJhY2Nlc3MiOiJtIiwic3ViamVjdCI6ImFwaS1rZXk6MDNhMTYzZjMtMGM3Zi00Njc5LWIzYmUtODg0MDdlMWQxZmExIn0.jmOLYMLyyLEKjbJNe67IKnLdtSoqBKZr6yS3uxv3O_A"
    api-key = ${?QDRANT_API_KEY}
    collection = "incidents"
  }

  mistral {
    api-key = "z130WSHBTS4c2TqZBOhP4mo1C4FQLN07"
    api-key = ${?MISTRAL_API_KEY}
    model = "mistral-small-latest"
    embed-model = "mistral-embed"
    vision-model = "pixtral-12b-2409"
    base-url = "https://api.mistral.ai/v1"
  }

  data {
    csv-path = "data/Gas_Sensors_Measurements.csv"
    replay-interval-ms = 200
  }

  # Email notifications — sent for every T2_ALERT and T3_SHUTDOWN escalation.
  # Leave smtp-host blank (or unset) to disable email entirely.
  #
  # Gmail example:
  #   smtp-host     = "smtp.gmail.com"
  #   smtp-port     = 587
  #   smtp-username = "you@gmail.com"
  #   smtp-password = "your-app-password"   # use an App Password, not your login password
  #   from          = "safety-monitor@gmail.com"
  #   to            = "oncall-engineer@yourcompany.com"
  #
  # All values can be overridden via environment variables.
  email {
    smtp-host     = ""
    smtp-host     = ${?EMAIL_SMTP_HOST}
    smtp-port     = 587
    smtp-port     = ${?EMAIL_SMTP_PORT}
    smtp-username = ""
    smtp-username = ${?EMAIL_SMTP_USER}
    smtp-password = ""
    smtp-password = ${?EMAIL_SMTP_PASS}
    from          = ""
    from          = ${?EMAIL_FROM}
    to            = ""
    to            = ${?EMAIL_TO}
    use-tls       = true
  }

  # InspecSafe V1 visual inspection integration.
  # data-path: root of the downloaded dataset (contains train/Annotations/).
  #            Falls back to simulated events when directory is absent.
  # replay-interval-ms: how often the agent fires a new waypoint event.
  inspecsafe {
    data-path          = "./inspecsafev1"
    data-path          = ${?INSPECSAFE_DATA_PATH}
    replay-interval-ms = 20000
  }

  model {
    pmml-path = "gas_classifier.pmml"
  }

  # Node role for multi-node cluster deployment.
  # "all"    — single-node mode: spawn every agent on this JVM (default)
  # "node-a" — SensorSharding + ThermalAgent + FusionAgent + ClassificationAgent + HTTP + Replay
  #             + InspectionReceiverActor (receives InspecSafe events from node-d)
  # "node-b" — RetrievalAgent + LLMReasoningAgent + EscalationAgent
  # "node-c" — OrchestratorAgent
  # "node-d" — VisualInspectionAgent (streams InspecSafe V1 dataset events to node-a)
  # Override at runtime: -DSAFETY_ROLE=node-d  OR  SAFETY_ROLE=node-d (env var)
  node-role = "all"
  node-role = ${?SAFETY_ROLE}
}