akka {
  loglevel = "INFO"

  actor {
    provider = "cluster"

    serialization-bindings {
      "edu.neu.safety.model.CborSerializable" = jackson-cbor
    }
  }

  remote.artery {
    canonical.hostname = "127.0.0.1"
    canonical.hostname = ${?AKKA_HOSTNAME}
    canonical.port = 0
  }

  cluster {
    seed-nodes = [
      "akka://SafetySystem@"${safety.cluster.host-a}":2551",
      "akka://SafetySystem@"${safety.cluster.host-bc}":2552"
    ]

    roles = []

    # Split-brain resolver: required for production cluster integrity.
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"

    sharding {
      number-of-shards = 7
    }
  }

  persistence {
    journal.plugin = "akka.persistence.journal.inmem"
    snapshot-store.plugin = "akka.persistence.snapshot-store.local"
    snapshot-store.local.dir = "target/snapshots"
  }
}

safety {
  cluster {
    host-a = "127.0.0.1"
    host-a = ${?CLUSTER_HOST_A}
    host-bc = "127.0.0.1"
    host-bc = ${?CLUSTER_HOST_BC}
  }

  mistral {
    api-key = ""
    api-key = ${?MISTRAL_API_KEY}
    base-url = "https://api.mistral.ai/v1"
    chat-model = "mistral-small-latest"
    embed-model = "mistral-embed"
  }

  qdrant {
    # Either local Docker (http://localhost:6333) or Qdrant Cloud (https://...qdrant.io).
    url = "http://localhost:6333"
    url = ${?QDRANT_URL}
    api-key = ""
    api-key = ${?QDRANT_API_KEY}
    collection = "incident_knowledge"
    vector-size = 1024
  }

  mongodb {
    # MongoDB Atlas URI (or mongodb://localhost:27017 for local Docker).
    uri = ""
    uri = ${?MONGODB_URI}
    database = "safety_monitoring"
  }

  replay {
    csv-path = "ml/data/expanded_final_dataset.csv"
    csv-path = ${?REPLAY_CSV_PATH}
    tick-interval = 2s
    thermal-dir = "ml/data/thermal/"
  }

  http {
    host = "0.0.0.0"
    port = 8080
  }

  classifier {
    model-path = "src/main/resources/gas_classifier.onnx"
    model-path = ${?CLASSIFIER_MODEL_PATH}
  }
}
