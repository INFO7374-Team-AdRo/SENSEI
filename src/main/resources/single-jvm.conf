# single-JVM dev mode — all roles colocated on one node.
# Run with: -Dconfig.resource=single-jvm.conf

include "application.conf"

akka {
  remote.artery.canonical.port = 2551

  cluster {
    seed-nodes = ["akka://SafetySystem@127.0.0.1:2551"]
    roles = ["ingestion", "fusion", "reasoning", "escalation", "orchestrator", "persistence", "dashboard"]
    min-nr-of-members = 1
  }
}

safety.http.port = 8080
