version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: safety-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safety-net

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: safety-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - safety-net

volumes:
  mongo_data:
  qdrant_data:

networks:
  safety-net:
    driver: bridge
