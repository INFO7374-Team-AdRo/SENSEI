akka {
  actor {
    provider = "cluster"

    serialization-bindings {
      "com.safety.protocol.CborSerializable" = jackson-cbor
    }
  }

  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      port = 2551
      port = ${?AKKA_PORT}
    }
  }

  cluster {
    seed-nodes = [
      "akka://industrial-safety@127.0.0.1:2551",
      "akka://industrial-safety@127.0.0.1:2552",
      "akka://industrial-safety@127.0.0.1:2553"
    ]

    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
  }
}

safety {
  http {
    host = "0.0.0.0"
    port = 8080
  }

  mongodb {
    uri = "mongodb+srv://USERNAME:PASSWORD@cluster0.xxxxx.mongodb.net/safety?retryWrites=true&w=majority"
    uri = ${?MONGODB_URI}
    database = "safety"
  }

  qdrant {
    url = "https://your-cluster-id.cloud.qdrant.io:6333"
    url = ${?QDRANT_URL}
    api-key = "your-qdrant-api-key"
    api-key = ${?QDRANT_API_KEY}
    collection = "incidents"
  }

  mistral {
    api-key = "your-mistral-api-key"
    api-key = ${?MISTRAL_API_KEY}
    model = "mistral-small-latest"
    embed-model = "mistral-embed"
    base-url = "https://api.mistral.ai/v1"
  }

  data {
    csv-path = "data/Gas_Sensors_Measurements.csv"
    replay-interval-ms = 200
  }

  model {
    pmml-path = "gas_classifier.pmml"
  }
}